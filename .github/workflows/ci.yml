name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build
        env:
          VITE_API_URL: /api

  docker-compose-smoke:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_agents_db
      JWT_SECRET: ci-secret-not-for-production
      FRONTEND_URL: http://localhost
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          echo 'DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ai_agents_db' >> .env
          echo 'JWT_SECRET=ci-secret-not-for-production' >> .env
          echo 'PORT=3001' >> .env
          echo 'FRONTEND_URL=http://localhost' >> .env

      - name: Build and run with Docker Compose
        run: |
          docker compose build
          docker compose up -d
          sleep 30

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health; then break; fi
            sleep 2
          done
          curl -sf http://localhost:3001/api/health

      - name: Check frontend responds
        run: curl -sf -o /dev/null -w "%{http_code}" http://localhost:80 | grep -q 200

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
