    <path d="M206 247c0-20.434 16.566-37 37-37s37 16.566 37 37" fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
    <circle cx="225" cy="225" r="5.2" fill="white"/>
    <circle cx="261" cy="225" r="5.2" fill="white"/>
    <path d="M206 265h74" stroke="white" stroke-width="10" stroke-linecap="round"/>

    <text x="310" y="220" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="64" font-weight="800" fill="white">
      AI Agents Pro
    </text>
    <text x="310" y="285" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="32" font-weight="500" fill="rgba(255,255,255,0.86)">
